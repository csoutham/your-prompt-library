name: Direct macOS release

on:
  push:
    branches:
      - main
    paths:
      - package.json
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-direct:
    runs-on: macos-15
    env:
      CSC_LINK: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_P12_BASE64 }}
      CSC_KEY_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Resolve release version
        id: release_meta
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          TAG_NAME="v$VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"

      - name: Check whether package version changed
        id: version_change
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          PREVIOUS_PACKAGE_JSON="$(git show "${{ github.event.before }}:package.json" 2>/dev/null || true)"
          if [[ -z "$PREVIOUS_PACKAGE_JSON" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          PREVIOUS_VERSION="$(printf '%s' "$PREVIOUS_PACKAGE_JSON" | node -e "let input=''; process.stdin.on('data', (chunk) => input += chunk); process.stdin.on('end', () => console.log(JSON.parse(input).version));")"
          CURRENT_VERSION="${{ steps.release_meta.outputs.version }}"

          if [[ "$PREVIOUS_VERSION" == "$CURRENT_VERSION" ]]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.version_change.outputs.changed == 'true'
        run: bun install --frozen-lockfile

      - name: Build signed direct distribution
        if: steps.version_change.outputs.changed == 'true'
        run: bun run package:direct

      - name: Upload workflow artefacts
        if: steps.version_change.outputs.changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: direct-macos-release
          path: |
            release/*.dmg
            release/*.dmg.blockmap
            release/*.zip
            release/*.zip.blockmap

      - name: Attach artefacts to GitHub release
        if: steps.version_change.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag_name }}
          name: Your Prompt Library ${{ steps.release_meta.outputs.version }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            release/*.dmg
            release/*.dmg.blockmap
            release/*.zip
            release/*.zip.blockmap
